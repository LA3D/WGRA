<script>
  // Quarto applies navbar `logo-href` to both the logo and the title anchors.
  // We want the LA3D logo to link to the org home but the "WGRA Nuggets" title
  // to link to the blog, so repoint just the title anchor here.
  document.addEventListener("DOMContentLoaded", function () {
    var title = document.querySelector("a.navbar-brand:not(.navbar-brand-logo)");
    if (title) { title.setAttribute("href", "https://la3d.github.io/WGRA/blog/"); }
  });
</script>
